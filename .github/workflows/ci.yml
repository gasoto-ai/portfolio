name: CI

on:
  push:
    branches: [main, playground]
  pull_request:
    branches: [main, playground]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test -- --passWithNoTests
      - run: npm run build
